<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tronix | 下载中心 · 获取最新版本</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #fc00ef, #04eff7); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ff4df0, #3df7ff); }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        /* 背景优化 - 统一自index.html */
        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
            line-height: 1.6;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow-x: hidden;
            padding-top: 100px; /* 为固定导航栏预留空间 */
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(59, 0, 70, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 70, 112, 0.4) 0%, transparent 40%),
                url(computer-bg.png) center/cover no-repeat;
            filter: brightness(0.3) contrast(1.3);
            transition: filter 0.5s;
        }
        
        /* 导航栏 - 液态玻璃风格 */
        nav {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 95vw;
            max-width: 1400px;
            background: rgba(10, 8, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav.scrolled {
            top: 0;
            width: 100%;
            max-width: 100%;
            border-radius: 0;
            padding: 0.7rem 5%;
            background: rgba(10, 8, 25, 0.85);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            letter-spacing: 1px;
        }
        
        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .nav-links a {
            font-weight: 500;
            color: #d0d0ff;
            display: inline-block;
            text-decoration: none;
            position: relative;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border-radius: 10px;
        }
        
        .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #fc00ef, #04eff7);
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .nav-links a:hover::after {
            width: 30px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .nav-btn {
            padding: 0.5rem 1.3rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid transparent;
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, #fc00ef, #04eff7);
            color: white;
            box-shadow: 0 4px 15px rgba(252, 0, 239, 0.3);
        }

        .nav-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 0, 239, 0.5);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        
        /* 下载页面特有样式 */
        .main-content {
            flex: 1;
        }
        
        .download-section {
            padding: 3rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .section-title h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ffffff, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .section-title p {
            font-size: 1.2rem;
            color: #e0e0ff;
            max-width: 700px;
            margin: 0 auto;
        }
        
        /* 下载卡片样式 - 适配深色主题 */
        .download-item {
            background: rgba(20, 15, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .download-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-color: rgba(124, 58, 237, 0.3);
        }
        
        .download-item .recommended {
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            color: white;
            font-weight: bold;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        
        .download-item h3 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .download-item .version {
            color: #04eff7;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            display: block;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #fc00ef, #04eff7);
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 14px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(252, 0, 239, 0.35);
            position: relative;
            overflow: hidden;
        }
        
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(252, 0, 239, 0.5);
        }
        
        .download-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .download-btn:hover::after {
            left: 100%;
        }
        
        .file-info {
            display: flex;
            align-items: center;
            color: #d0d0ff;
            font-size: 0.9rem;
        }
        
        .file-info i {
            font-size: 1.5rem;
            margin-right: 1rem;
            color: #fc00ef;
        }
        
        /* 版本选择区域 */
        .version-selector {
            background: rgba(20, 15, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .version-selector h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .version-selector h3 i {
            margin-right: 0.8rem;
        }
        
        .version-selector select {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .version-selector select option {
            background: #24243e;
            color: white;
        }
        
        .version-selector .info-box {
            background: rgba(0, 70, 112, 0.3);
            border: 1px solid rgba(4, 239, 247, 0.3);
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.5rem;
            color: #d0d0ff;
            font-size: 0.9rem;
        }
        
        .version-selector .info-box i {
            color: #04eff7;
            margin-right: 0.5rem;
        }
        
        .version-selector .select-wrapper {
            display: flex;
            gap: 1rem;
        }
        
        .version-selector .select-wrapper select {
            flex: 2;
        }
        
        .version-selector .select-wrapper button {
            flex: 1;
        }

/* 下载进度条动画 */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fc00ef, #04eff7);
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .download-progress-text {
            font-size: 0.9rem;
            color: #04eff7;
            margin-top: 0.5rem;
            display: none;
        }

        /* 版本切换过渡效果 */
        .download-item {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .download-item.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .version-selector select {
            transition: all 0.3s ease;
        }

        .version-selector select:focus {
            outline: none;
            border-color: #04eff7;
            box-shadow: 0 0 10px rgba(4, 239, 247, 0.3);
        }

        /* 悬浮卡片效果 */
        .download-item:hover {
            border-color: rgba(252, 0, 239, 0.4);
            box-shadow: 0 0 20px rgba(252, 0, 239, 0.2);
        }

        footer {
            position: relative;
            padding: 3rem 5% 2rem;
            text-align: center;
            background: rgba(10, 8, 25, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(252, 0, 239, 0.15);
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .footer-content div {
            margin: 0.5rem 0;
        }
        
        .copyright {
            font-size: 0.95rem;
            color: #a0a0d0;
            font-weight: 500;
        }
        
        .rights {
            font-size: 0.9rem;
            color: #8080b0;
        }

        @media (max-width: 768px) {
            nav {
                width: 100%;
                top: 0;
                border-radius: 0;
                max-width: 100%;
                padding: 0.8rem 5%;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(10, 8, 25, 0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 1rem;
                border-radius: 0 0 16px 16px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-top: none;
            }
            .nav-links.active {
                display: flex;
            }
            .nav-links a {
                width: 100%;
                padding: 0.8rem 1rem;
            }
            .mobile-menu-btn {
                display: block;
            }
            body {
                padding-top: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 - 液态玻璃风格 -->
    <nav id="navbar">
        <div class="logo">Tronix</div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">首页</a>
            <a href="forum.html">论坛</a>
            <a href="tools.html">工具</a>
            <a href="download.html">下载</a>
            <a href="login.html">登录</a>
        </div>
        <div class="nav-actions">
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- 下载中心内容 -->
    <div class="main-content">
    <section class="download-section">
        <div class="section-title">
            <h2>下载中心</h2>
            <p>选择适合您设备的Tronix客户端，享受流畅的操作体验与最新功能</p>
        </div>

        <!-- 主要下载卡片 -->
        <div class="download-item">
            <span class="recommended">推荐版本</span>
            <h3>Windows 客户端</h3>
            <span class="version">v3.2.1 稳定版</span>
            
            <button class="download-btn" onclick="startDownload('v3.2.1')">
                <i class="fas fa-download mr-3"></i> 立即下载 (64位)
            </button>
            
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="download-progress-text" id="progressText">下载进度: 0%</div>
            
            <div class="file-info">
                <i class="fas fa-file-exe"></i>
                <div>
                    <p>文件大小: <span style="color: #04eff7;">82.3 MB</span></p>
                    <p>SHA256: <span style="color: #04eff7;">9a8f7...d3b</span></p>
                </div>
            </div>
        </div>

        <!-- 版本选择区域 -->
        <div class="version-selector">
            <h3><i class="fas fa-box-open"></i> 选择其他版本</h3>
            
            <div class="select-wrapper">
                <select id="versionSelect">
                    <option value="3.2.1">v3.2.1 稳定版 (推荐)</option>
                    <option value="3.3.0-beta">v3.3.0 测试版 (最新功能)</option>
                    <option value="3.1.5">v3.1.5 兼容版 (旧系统)</option>
                </select>
                
                <button onclick="startDownload()" class="download-btn">
                    <i class="fas fa-download mr-2"></i> 下载
                </button>
            </div>
            
            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> 测试版包含未完全验证的新功能，可能存在兼容性问题，建议开发人员使用</p>
            </div>
        </div>
    </section>
    </div>

    <!-- 页脚 -->
    <footer id="footer">
        <div class="footer-content">
            <div class="copyright">版权所有 &copy; Tronix</div>
            <div class="rights">最终解释权归：Tronix</div>
        </div>
    </footer>

    <script>
    // 下载功能脚本
    function startDownload(version) {
        const versionSelect = document.getElementById('versionSelect');
        const selectedVersion = version || versionSelect.value;
        const filename = `Tronix_${selectedVersion}.exe`;
        
        // 获取按钮元素
        const btn = event.currentTarget;
        
        // 显示进度条
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        progressContainer.style.display = 'block';
        progressText.style.display = 'block';
        
        // 按钮加载状态动画
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 准备中...';
        
        // 模拟下载进度
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress > 100) progress = 100;
            
            progressBar.style.width = progress + '%';
            progressText.textContent = `下载进度: ${Math.round(progress)}%`;
            
            if (progress === 100) {
                clearInterval(interval);
                btn.innerHTML = '<i class="fas fa-check mr-2"></i> 下载完成';
                setTimeout(() => {
                    window.location.href = `/downloads/${filename}`;
                    // 恢复按钮状态
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-download mr-3"></i> 立即下载 (64位)';
                        progressBar.style.width = '0%';
                        progressContainer.style.display = 'none';
                        progressText.style.display = 'none';
                    }, 1000);
                }, 500);
            } else {
                btn.innerHTML = `<i class="fas fa-download mr-2"></i> 下载中 ${Math.round(progress)}%`;
            }
        }, 300);
    }

    // 版本切换效果
    const versionSelect = document.getElementById('versionSelect');
    const downloadItem = document.querySelector('.download-item');
    
    versionSelect.addEventListener('change', function() {
        downloadItem.classList.add('hidden');
        
        setTimeout(() => {
            const version = this.value;
            const versionLabels = {
                '3.2.1': 'v3.2.1 稳定版',
                '3.3.0-beta': 'v3.3.0 测试版',
                '3.1.5': 'v3.1.5 兼容版'
            };
            
            document.querySelector('.version').textContent = versionLabels[version];
            downloadItem.classList.remove('hidden');
        }, 300);
    });

    function toggleMobileMenu() {
        const navLinks = document.getElementById('navLinks');
        navLinks.classList.toggle('active');
    }

    document.addEventListener('click', function(e) {
        const navLinks = document.getElementById('navLinks');
        const menuBtn = document.querySelector('.mobile-menu-btn');
        if (!navLinks.contains(e.target) && !menuBtn.contains(e.target)) {
            navLinks.classList.remove('active');
        }
    });

    // 页面滚动动画
    document.addEventListener('DOMContentLoaded', () => {
        document.body.style.opacity = '1';

        const sections = document.querySelectorAll('.download-item, .version-selector');
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });
        
        sections.forEach(section => {
            section.style.opacity = '0';
            section.style.transform = 'translateY(30px)';
            section.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(section);
        });
        
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', function() {
            if (window.pageYOffset > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });
    });
    </script>
    <script src="auth.js"></script>
</body>
</html>
