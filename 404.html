<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tronix | 404 页面未找到</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #fc00ef, #04eff7); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ff4df0, #3df7ff); }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            position: relative;
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 10% 20%, rgba(59, 0, 70, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 70, 112, 0.4) 0%, transparent 40%),
                url(computer-bg.png) center/cover no-repeat;
            filter: brightness(0.3) contrast(1.3);
            transition: filter 0.5s;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(252, 0, 239, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(4, 239, 247, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        
        nav {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 95vw;
            max-width: 1400px;
            background: rgba(10, 8, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav.scrolled {
            top: 0;
            width: 100%;
            max-width: 100%;
            border-radius: 0;
            padding: 0.7rem 5%;
            background: rgba(10, 8, 25, 0.85);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
        }
        
        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .nav-links a {
            font-weight: 500;
            color: #d0d0ff;
            display: inline-block;
            text-decoration: none;
            position: relative;
            padding: 0.5rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border-radius: 10px;
        }
        
        .nav-links a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #fc00ef, #04eff7);
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .nav-links a:hover::after {
            width: 30px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .nav-btn {
            padding: 0.5rem 1.3rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1px solid transparent;
        }

        .nav-btn-primary {
            background: linear-gradient(135deg, #fc00ef, #04eff7);
            color: white;
            box-shadow: 0 4px 15px rgba(252, 0, 239, 0.3);
        }

        .nav-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 0, 239, 0.5);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
        }

        .error-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 5% 60px;
            position: relative;
        }

        .error-content {
            text-align: center;
            max-width: 800px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .error-code {
            font-size: 12rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fc00ef 0%, #04eff7 50%, #fc00ef 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 60px rgba(252, 0, 239, 0.3);
            letter-spacing: -10px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .error-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffffff, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .error-subtitle {
            font-size: 1.2rem;
            color: #a0a0d0;
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .error-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.9rem 2rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fc00ef, #04eff7);
            color: white;
            box-shadow: 0 6px 20px rgba(252, 0, 239, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(252, 0, 239, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(4, 239, 247, 0.4);
            transform: translateY(-3px);
        }

        .glitch-effect {
            position: relative;
        }

        .glitch-effect::before,
        .glitch-effect::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fc00ef 0%, #04eff7 50%, #fc00ef 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.7;
        }

        .glitch-effect::before {
            animation: glitch1 2s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch-effect::after {
            animation: glitch2 2.5s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch1 {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        @keyframes glitch2 {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(3px); }
            40% { transform: translateX(-3px); }
            60% { transform: translateX(2px); }
            80% { transform: translateX(-2px); }
        }

        .floating-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticle 15s infinite linear;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .decoration-ring {
            position: absolute;
            border: 2px solid rgba(252, 0, 239, 0.2);
            border-radius: 50%;
            animation: ringPulse 4s ease-in-out infinite;
        }

        .decoration-ring:nth-child(1) {
            width: 300px;
            height: 300px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 0s;
        }

        .decoration-ring:nth-child(2) {
            width: 450px;
            height: 450px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1s;
            border-color: rgba(4, 239, 247, 0.15);
        }

        .decoration-ring:nth-child(3) {
            width: 600px;
            height: 600px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 2s;
            border-color: rgba(252, 0, 239, 0.1);
        }

        @keyframes ringPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }
        
        footer {
            position: relative;
            padding: 3rem 5% 2rem;
            text-align: center;
            background: rgba(10, 8, 25, 0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(252, 0, 239, 0.15);
        }
        
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .footer-content div {
            margin: 0.5rem 0;
        }
        
        .copyright {
            font-size: 0.95rem;
            color: #a0a0d0;
            font-weight: 500;
        }
        
        .rights {
            font-size: 0.9rem;
            color: #8080b0;
        }

        @media (max-width: 1024px) {
            .error-code {
                font-size: 8rem;
                letter-spacing: -5px;
            }
            .error-title {
                font-size: 2rem;
            }
            .decoration-ring:nth-child(1) { width: 200px; height: 200px; }
            .decoration-ring:nth-child(2) { width: 320px; height: 320px; }
            .decoration-ring:nth-child(3) { width: 440px; height: 440px; }
        }
        
        @media (max-width: 768px) {
            nav {
                width: 100%;
                top: 0;
                border-radius: 0;
                max-width: 100%;
                padding: 0.8rem 5%;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(10, 8, 25, 0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 1rem;
                border-radius: 0 0 16px 16px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-top: none;
            }
            .nav-links.active {
                display: flex;
            }
            .nav-links a {
                width: 100%;
                padding: 0.8rem 1rem;
            }
            .mobile-menu-btn {
                display: block;
            }
            .error-container {
                padding: 100px 5% 40px;
            }
            .error-code {
                font-size: 6rem;
                letter-spacing: -3px;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .error-subtitle {
                font-size: 1rem;
            }
            .decoration-ring:nth-child(1) { width: 150px; height: 150px; }
            .decoration-ring:nth-child(2) { width: 240px; height: 240px; }
            .decoration-ring:nth-child(3) { width: 330px; height: 330px; }
        }
        
        @media (max-width: 480px) {
            .error-code {
                font-size: 4.5rem;
            }
            .btn {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo">Tronix</div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">首页</a>
            <a href="forum.html">论坛</a>
            <a href="tools.html">工具</a>
            <a href="download.html">下载</a>
            <a href="login.html">登录</a>
        </div>
        <div class="nav-actions">
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <section class="error-container">
        <div class="floating-particles" id="particles"></div>
        
        <div class="decoration-ring"></div>
        <div class="decoration-ring"></div>
        <div class="decoration-ring"></div>

        <div class="error-content">
            <div class="error-code glitch-effect">404</div>
            <h1 class="error-title">页面走丢了</h1>
            <p class="error-subtitle">抱歉，您访问的页面不存在或已被移除。请检查网址是否正确，或返回首页继续探索。</p>
            <div class="error-buttons">
                <a href="index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
                <a href="download.html" class="btn btn-secondary">
                    <i class="fas fa-download"></i> 下载中心
                </a>
            </div>
        </div>
    </section>
    
    <footer>
        <div class="footer-content">
            <div class="copyright">版权所有 &copy; Tronix</div>
            <div class="rights">最终解释权归：Tronix</div>
        </div>
    </footer>

    <script>
        const navbar = document.getElementById('navbar');

        window.addEventListener('scroll', function() {
            const currentScroll = window.pageYOffset;
            if (currentScroll > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        function toggleMobileMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            const navLinks = document.getElementById('navLinks');
            const menuBtn = document.querySelector('.mobile-menu-btn');
            if (!navLinks.contains(e.target) && !menuBtn.contains(e.target)) {
                navLinks.classList.remove('active');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            document.body.style.opacity = '1';
            createParticles();
        });

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                const size = 2 + Math.random() * 4;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.opacity = 0.3 + Math.random() * 0.5;
                particlesContainer.appendChild(particle);
            }
        }
    </script>
</body>
</html>
