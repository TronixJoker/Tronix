<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tronix | 个人中心</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #fc00ef, #04eff7); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ff4df0, #3df7ff); }

        body {
            position: relative; min-height: 100vh; color: #fff; line-height: 1.6;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow-x: hidden; opacity: 0; transition: opacity 0.5s ease;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background:
                radial-gradient(circle at 10% 20%, rgba(59,0,70,0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0,70,112,0.4) 0%, transparent 40%),
                url(computer-bg.png) center/cover no-repeat;
            filter: brightness(0.3) contrast(1.3); transition: filter 0.5s;
        }

        /* 液态玻璃导航栏 */
        nav {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 95vw; max-width: 1200px;
            background: rgba(10,8,25,0.5);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 0.9rem 2rem; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1),
                0 0 40px rgba(252,0,239,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        nav.scrolled {
            top: 0; width: 100%; max-width: 100%; border-radius: 0;
            padding: 0.7rem 5%;
            background: rgba(10,8,25,0.85);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }
        .logo {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block; letter-spacing: 1px;
        }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; }
        .nav-links a {
            font-weight: 500; color: #d0d0ff;
            display: inline-block; text-decoration: none;
            position: relative; padding: 0.5rem 1rem;
            font-size: 0.95rem; transition: all 0.3s ease;
            border-radius: 10px;
        }
        .nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: 2px; left: 50%;
            transform: translateX(-50%); width: 0; height: 2px;
            background: linear-gradient(90deg, #fc00ef, #04eff7);
            transition: width 0.3s ease; border-radius: 2px;
        }
        .nav-links a:hover::after { width: 30px; }
        .nav-links a.active {
            color: #fff;
            background: rgba(252,0,239,0.15);
        }
        .nav-links a.active::after { width: 30px; }
        .nav-actions { display: flex; align-items: center; gap: 0.8rem; }
        .mobile-menu-btn {
            display: none; background: none; border: none;
            color: #fff; font-size: 1.3rem; cursor: pointer; padding: 0.5rem;
        }

        /* 主内容区 */
        .page-container {
            max-width: 1100px; margin: 0 auto;
            padding: 120px 5% 60px;
        }

        /* 页面标题 */
        .page-header {
            text-align: center; margin-bottom: 2.5rem;
            animation: fadeInDown 0.6s ease;
        }
        .page-header h1 {
            font-size: 2.8rem;
            background: linear-gradient(45deg, #fff, #c0e0ff, #04eff7);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem; letter-spacing: 2px;
        }
        .page-header p { color: #a0a0d0; font-size: 1.05rem; }

        /* 标签切换 - 液态玻璃风格 */
        .tabs-container {
            display: flex; justify-content: center;
            margin-bottom: 2rem; gap: 0.5rem;
            padding: 0.5rem;
            background: rgba(20,15,45,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .tab-btn {
            padding: 0.8rem 2rem;
            background: transparent;
            border: none;
            color: #d0d0ff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            position: relative;
            overflow: hidden;
        }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(252,0,239,0.25), rgba(4,239,247,0.25));
            color: #fff;
            box-shadow: 
                0 4px 20px rgba(252,0,239,0.2),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .tab-btn.active::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        .tab-btn i { font-size: 1rem; }

        /* 内容面板 */
        .tab-content { display: none; animation: fadeInUp 0.5s ease; }
        .tab-content.active { display: block; }

        /* 个人中心卡片 */
        .profile-card {
            background: rgba(20,15,45,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        /* 个人信息头部 */
        .profile-header {
            padding: 2.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            background: linear-gradient(135deg, rgba(252,0,239,0.1), rgba(4,239,247,0.1));
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%; right: -20%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(252,0,239,0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
        }
        .profile-avatar-xl {
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            box-shadow: 
                0 0 30px rgba(252,0,239,0.3),
                0 0 60px rgba(4,239,247,0.2);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(252,0,239,0.3), 0 0 60px rgba(4,239,247,0.2); }
            50% { box-shadow: 0 0 40px rgba(252,0,239,0.5), 0 0 80px rgba(4,239,247,0.3); }
        }
        .profile-avatar-xl img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .profile-info { position: relative; z-index: 1; flex-grow: 1; }
        .profile-info h2 {
            font-size: 2rem;
            margin-bottom: 0.3rem;
            display: flex; align-items: center; gap: 0.8rem;
        }
        .profile-info .role-text { color: #a0a0d0; font-size: 0.95rem; margin-bottom: 0.8rem; }
        .admin-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 0.2rem 0.7rem;
            border-radius: 12px;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .profile-stats {
            display: flex; gap: 2rem;
            margin-top: 1rem;
        }
        .stat-item { text-align: center; }
        .stat-value {
            font-size: 1.5rem; font-weight: 700;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: #8080b0; font-size: 0.82rem; margin-top: 0.2rem; }

        /* 信息卡片网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }
        .info-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
        }
        .info-card:hover {
            border-color: rgba(4,239,247,0.2);
            background: rgba(4,239,247,0.04);
            transform: translateY(-2px);
        }
        .info-card-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(252,0,239,0.2), rgba(4,239,247,0.2));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #04eff7;
        }
        .info-card-label { color: #8080b0; font-size: 0.85rem; margin-bottom: 0.4rem; }
        .info-card-value { color: #fff; font-size: 1.1rem; font-weight: 500; word-break: break-all; }

        /* 邀请码卡片 */
        .invite-section {
            background: rgba(20,15,45,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .section-title i {
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .invite-code-display {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.5rem;
            background: linear-gradient(135deg, rgba(4,239,247,0.08), rgba(252,0,239,0.08));
            border-radius: 16px;
            border: 1px dashed rgba(4,239,247,0.3);
            margin-bottom: 1.2rem;
        }
        .invite-code-label { color: #a0a0d0; font-size: 0.9rem; flex-shrink: 0; }
        .invite-code-text {
            flex-grow: 1;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: #04eff7;
            letter-spacing: 3px;
            text-align: center;
        }
        .copy-btn {
            padding: 0.7rem 1.2rem;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            border: none;
            color: #fff;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252,0,239,0.35);
        }
        .invite-note { color: #8080b0; font-size: 0.85rem; }

        /* 邀请列表 */
        .invited-list-section {
            background: rgba(20,15,45,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2rem;
        }
        .invited-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .invited-list-header h3 {
            font-size: 1.3rem;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .invited-count-badge {
            padding: 0.3rem 0.8rem;
            background: linear-gradient(45deg, rgba(252,0,239,0.2), rgba(4,239,247,0.2));
            border-radius: 20px;
            font-size: 0.85rem;
            color: #04eff7;
            font-weight: 600;
        }
        .invited-list { display: flex; flex-direction: column; gap: 0.8rem; }
        .invited-user-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .invited-user-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(4,239,247,0.15);
            transform: translateX(4px);
        }
        .invited-user-avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .invited-user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .invited-user-info { flex-grow: 1; min-width: 0; }
        .invited-user-name {
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.2rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .invited-user-date { color: #8080b0; font-size: 0.82rem; }
        .status-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-badge.active { background: rgba(0,200,83,0.15); color: #69f0ae; }
        .status-badge.banned { background: rgba(255,77,77,0.15); color: #ff8a8a; }
        .status-badge.muted { background: rgba(255,193,7,0.15); color: #ffd54f; }
        .no-invited {
            text-align: center;
            padding: 3rem 1rem;
            color: #8080b0;
        }
        .no-invited i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
            display: block;
        }

        /* 账户设置卡片 */
        .settings-card {
            background: rgba(20,15,45,0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        .settings-section { margin-bottom: 2.5rem; }
        .settings-section:last-child { margin-bottom: 0; }
        .settings-section-title {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 0.6rem;
        }
        .settings-section-title i {
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group { margin-bottom: 1.3rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e0e0ff;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #04eff7;
            box-shadow: 0 0 20px rgba(4,239,247,0.15);
            background: rgba(255,255,255,0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .btn-primary {
            padding: 0.9rem 2rem;
            border-radius: 14px;
            background: linear-gradient(45deg, #fc00ef, #04eff7);
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(252,0,239,0.35);
        }
        .btn-danger {
            padding: 0.9rem 2rem;
            border-radius: 14px;
            background: rgba(255,77,77,0.15);
            border: 1px solid rgba(255,77,77,0.3);
            color: #ff8a8a;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-danger:hover {
            background: rgba(255,77,77,0.25);
            border-color: rgba(255,77,77,0.5);
            color: #fff;
        }

        /* 页脚 */
        footer {
            padding: 2.5rem 5% 2rem;
            text-align: center;
            background: rgba(10,8,25,0.6);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(252,0,239,0.15);
            margin-top: 3rem;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .footer-inner div { color: #a0a0d0; font-size: 0.9rem; }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 0.9rem 1.8rem;
            border-radius: 14px;
            color: #fff;
            font-size: 0.9rem;
            z-index: 3000;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { background: rgba(0,200,83,0.25); border-color: rgba(0,200,83,0.3); }
        .toast.error { background: rgba(255,77,77,0.25); border-color: rgba(255,77,77,0.3); }
        .toast.info { background: rgba(4,239,247,0.25); border-color: rgba(4,239,247,0.3); }

        /* 动画 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }

        /* 响应式 */
        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%; left: 0; right: 0;
                background: rgba(10,8,25,0.95);
                backdrop-filter: blur(20px);
                flex-direction: column;
                padding: 1rem;
                border-radius: 0 0 16px 16px;
                border: 1px solid rgba(255,255,255,0.1);
                border-top: none;
            }
            .nav-links.active { display: flex; }
            .page-header h1 { font-size: 2rem; }
            .profile-header { flex-direction: column; text-align: center; padding: 1.5rem; }
            .profile-info h2 { justify-content: center; }
            .profile-stats { justify-content: center; }
            .info-grid { padding: 1.5rem; }
            .tabs-container { padding: 0.4rem; }
            .tab-btn { padding: 0.7rem 1.3rem; font-size: 0.88rem; }
            .settings-card { padding: 1.5rem; }
            .invite-code-display { flex-direction: column; }
            .invite-code-text { font-size: 1.2rem; }
        }
        @media (max-width: 480px) {
            .page-header h1 { font-size: 1.6rem; }
            .profile-avatar-xl { width: 90px; height: 90px; font-size: 2.5rem; }
            .profile-info h2 { font-size: 1.5rem; }
            .profile-stats { gap: 1.2rem; }
            .stat-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo">Tronix</div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">首页</a>
            <a href="forum.html">论坛</a>
            <a href="tools.html">工具</a>
            <a href="download.html">下载</a>
            <a href="profile.html" class="active">个人中心</a>
        </div>
        <div class="nav-actions">
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1>个人中心</h1>
            <p>管理你的账户信息和设置</p>
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" data-tab="profile" onclick="switchTab('profile')">
                <i class="fas fa-user-circle"></i> 个人中心
            </button>
            <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">
                <i class="fas fa-cog"></i> 账户设置
            </button>
        </div>

        <!-- 个人中心标签页 -->
        <div class="tab-content active" id="profileTab">
            <div class="profile-card fade-in">
                <div class="profile-header">
                    <div class="profile-avatar-xl" id="profileAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="profile-info">
                        <h2 id="profileUsername">
                            加载中...
                            <span class="admin-badge" id="adminBadge" style="display:none;">管理员</span>
                        </h2>
                        <div class="role-text" id="profileRole">欢迎来到 Tronix</div>
                        <div class="profile-stats">
                            <div class="stat-item">
                                <div class="stat-value" id="invitedCount">0</div>
                                <div class="stat-label">邀请人数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="joinDays">0</div>
                                <div class="stat-label">加入天数</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-card-icon"><i class="fas fa-user"></i></div>
                        <div class="info-card-label">用户名</div>
                        <div class="info-card-value" id="infoUsername">-</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-icon"><i class="fas fa-shield-alt"></i></div>
                        <div class="info-card-label">账户角色</div>
                        <div class="info-card-value" id="infoRole">-</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-icon"><i class="fas fa-calendar-alt"></i></div>
                        <div class="info-card-label">注册时间</div>
                        <div class="info-card-value" id="infoCreated">-</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-icon"><i class="fas fa-id-card"></i></div>
                        <div class="info-card-label">用户ID</div>
                        <div class="info-card-value" id="infoId">-</div>
                    </div>
                </div>
            </div>

            <div class="invite-section fade-in">
                <h3 class="section-title"><i class="fas fa-ticket-alt"></i> 我的邀请码</h3>
                <div class="invite-code-display">
                    <span class="invite-code-label">邀请码：</span>
                    <span class="invite-code-text" id="inviteCodeText">加载中...</span>
                    <button class="copy-btn" onclick="copyInviteCode()">
                        <i class="fas fa-copy"></i> 复制
                    </button>
                </div>
                <p class="invite-note">分享你的邀请码给好友，好友注册成功后你的邀请码会自动刷新。</p>
            </div>

            <div class="invited-list-section fade-in">
                <div class="invited-list-header">
                    <h3><i class="fas fa-users" style="background:linear-gradient(45deg,#fc00ef,#04eff7);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;"></i> 我邀请的人</h3>
                    <span class="invited-count-badge" id="invitedCountBadge">0 人</span>
                </div>
                <div class="invited-list" id="invitedList">
                    <div class="no-invited">
                        <i class="fas fa-user-plus"></i>
                        <p>暂无邀请记录</p>
                        <p style="font-size:0.85rem;margin-top:0.5rem;">分享你的邀请码，邀请好友加入吧~</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 账户设置标签页 -->
        <div class="tab-content" id="settingsTab">
            <div class="settings-card fade-in">
                <div class="settings-section">
                    <h3 class="settings-section-title">
                        <i class="fas fa-key"></i> 修改密码
                    </h3>
                    <form id="changePasswordForm" onsubmit="changePassword(event)">
                        <div class="form-group">
                            <label for="oldPassword">当前密码</label>
                            <input type="password" id="oldPassword" placeholder="请输入当前密码" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="newPassword">新密码</label>
                                <input type="password" id="newPassword" placeholder="至少6位字符" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">确认新密码</label>
                                <input type="password" id="confirmPassword" placeholder="再次输入新密码" required minlength="6">
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> 确认修改
                        </button>
                    </form>
                </div>

                <div class="settings-section">
                    <h3 class="settings-section-title">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </h3>
                    <p style="color:#a0a0d0;margin-bottom:1rem;">退出当前账户，返回登录页面。</p>
                    <button class="btn-danger" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> 退出登录
                    </button>
                </div>
            </div>
        </div>

    <div class="toast" id="toast"></div>

    <footer>
        <div class="footer-inner">
            <div>版权所有 &copy; Tronix</div>
            <div>最终解释权归：Tronix</div>
        </div>
    </footer>

    <script>
        const API_BASE = '/api';

        function getToken() { return localStorage.getItem('tronixToken') || sessionStorage.getItem('tronixToken'); }
        function getCurrentUser() {
            try { return JSON.parse(localStorage.getItem('tronixUser') || sessionStorage.getItem('tronixUser') || 'null'); }
            catch { return null; }
        }
        function authHeaders() {
            const h = { 'Content-Type': 'application/json' };
            const t = getToken();
            if (t) h['Authorization'] = 'Bearer ' + t;
            return h;
        }
        async function apiGet(path) {
            try { const r = await fetch(API_BASE + path, { headers: authHeaders() }); return await r.json(); }
            catch { return { success: false, message: '网络错误，请稍后重试' }; }
        }
        async function apiPost(path, body) {
            try { const r = await fetch(API_BASE + path, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) }); return await r.json(); }
            catch { return { success: false, message: '网络错误，请稍后重试' }; }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text == null ? '' : text; return div.innerHTML; }
        const fallbackAvatar = name => 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name || '用户') + '&background=6366f1&color=fff';

        function toggleMobileMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === tab + 'Tab');
            });
        }

        function checkAuth() {
            if (!getCurrentUser() || !getToken()) {
                showToast('请先登录', 'error');
                setTimeout(() => window.location.href = 'login.html', 1000);
                return false;
            }
            return true;
        }

        function loadProfile() {
            const user = getCurrentUser();
            if (!user) return;

            const avatarEl = document.getElementById('profileAvatar');
            if (user.avatar) {
                avatarEl.innerHTML = `<img src="${user.avatar}" alt="头像">`;
            } else {
                avatarEl.innerHTML = `<img src="${fallbackAvatar(user.username)}" alt="头像">`;
            }

            document.getElementById('profileUsername').innerHTML = escapeHtml(user.username);
            document.getElementById('adminBadge').style.display = user.role === 'admin' ? 'inline-block' : 'none';
            document.getElementById('profileRole').textContent = user.role === 'admin' ? '管理员账户' : '普通用户';

            document.getElementById('infoUsername').textContent = user.username;
            document.getElementById('infoRole').textContent = user.role === 'admin' ? '管理员' : '普通用户';
            document.getElementById('infoId').textContent = user.id || '-';

            if (user.createdAt) {
                const date = new Date(user.createdAt);
                document.getElementById('infoCreated').textContent = date.toLocaleDateString('zh-CN');
                const days = Math.floor((Date.now() - date.getTime()) / (1000 * 60 * 60 * 24));
                document.getElementById('joinDays').textContent = days;
            }
        }

        async function loadInviteCode() {
            const res = await apiGet('/invite/code');
            if (res && res.success && res.inviteCode) {
                document.getElementById('inviteCodeText').textContent = res.inviteCode;
            } else {
                document.getElementById('inviteCodeText').textContent = '暂无';
            }
        }

        function copyInviteCode() {
            const code = document.getElementById('inviteCodeText').textContent;
            if (!code || code === '加载中...' || code === '暂无') {
                showToast('邀请码不可用', 'error');
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code).then(() => {
                    showToast('邀请码已复制', 'success');
                }).catch(() => fallbackCopy(code));
            } else {
                fallbackCopy(code);
            }
        }
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showToast('邀请码已复制', 'success');
            } catch {
                showToast('复制失败，请手动复制', 'error');
            }
            document.body.removeChild(textarea);
        }

        async function loadInvitedUsers() {
            const res = await apiGet('/invite/mine');
            const listEl = document.getElementById('invitedList');
            const countBadge = document.getElementById('invitedCountBadge');
            const countEl = document.getElementById('invitedCount');

            if (res && res.success && Array.isArray(res.users)) {
                countBadge.textContent = res.count + ' 人';
                countEl.textContent = res.count;

                if (res.users.length === 0) {
                    listEl.innerHTML = `
                        <div class="no-invited">
                            <i class="fas fa-user-plus"></i>
                            <p>暂无邀请记录</p>
                            <p style="font-size:0.85rem;margin-top:0.5rem;">分享你的邀请码，邀请好友加入吧~</p>
                        </div>`;
                } else {
                    listEl.innerHTML = res.users.map(u => {
                        const statusClass = u.status === 'active' ? 'active' : (u.status === 'banned' ? 'banned' : 'muted');
                        const statusText = u.status === 'active' ? '正常' : (u.status === 'banned' ? '已封禁' : '已禁言');
                        const avatar = u.avatar || fallbackAvatar(u.username);
                        const joinDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '未知';
                        return `
                            <div class="invited-user-item">
                                <div class="invited-user-avatar">
                                    <img src="${avatar}" alt="${escapeHtml(u.username)}" loading="lazy">
                                </div>
                                <div class="invited-user-info">
                                    <div class="invited-user-name">
                                        ${escapeHtml(u.username)}
                                        <span class="status-badge ${statusClass}">${statusText}</span>
                                    </div>
                                    <div class="invited-user-date">
                                        <i class="far fa-clock"></i> 加入时间：${joinDate}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } else {
                listEl.innerHTML = `<div class="no-invited"><i class="fas fa-exclamation-circle"></i><p>加载失败，请刷新重试</p></div>`;
            }
        }

        async function changePassword(e) {
            e.preventDefault();
            if (!checkAuth()) return;

            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }

            const res = await apiPost('/auth/change-password', { oldPassword, newPassword });
            if (res && res.success) {
                showToast('密码修改成功', 'success');
                document.getElementById('changePasswordForm').reset();
            } else {
                showToast((res && res.message) || '修改失败', 'error');
            }
        }

        function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            localStorage.removeItem('tronixToken');
            sessionStorage.removeItem('tronixToken');
            localStorage.removeItem('tronixUser');
            sessionStorage.removeItem('tronixUser');
            showToast('已退出登录', 'success');
            setTimeout(() => window.location.href = 'login.html', 800);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '1';
            if (checkAuth()) {
                loadProfile();
                loadInviteCode();
                loadInvitedUsers();
            }
        });
    </script>
</body>
